<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: rgb(20, 181, 146);
        transform: rotate(45deg);
        margin: 40px auto;
        transition: background-color 0.3s ease-in 0.1s;
      }
      .box:hover {
        background-color: rgb(255, 149, 0);
      }
    </style>
  </head>

  <body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </body>
</html>
