<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Practice</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 1행: header + menu */
    .top {
      display: flex;
      width: 100%;
      height: 120px;
    }

    .header {
      width: 25%;
      background: #09153b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    .menu {
      width: 75%;
      background: #f53b57;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    /* 2행: hero */
    .hero {
      width: 100%;
      height: 520px;
      background: #5a8fcb;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    /* 3행: main | blank | image+extra */
    .middle {
      width: 100%;
      height: 480px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
    }

    .main {
      background: #22395b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    .blank {
      background: #f3f3f3;
    }

    .side {
      display: grid;
      grid-template-rows: 1fr 1fr;
    }

    .image {
      background: #c6e1e1;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
    }

    .extra {
      background: #58c39d;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
    }

    /* 4행: banner */
    .banner {
      width: 100%;
      height: 180px;
      background: #f3cd67;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    /* 반응형 - 선택 */
    @media (max-width: 900px) {
      .header,
      .menu,
      .hero,
      .main,
      .banner {
        font-size: 2.2rem;
      }

      .image,
      .extra {
        font-size: 2rem;
      }

      .middle {
        grid-template-columns: 1.5fr 0.8fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .top {
        flex-direction: column;
        height: auto;
      }

      .header,
      .menu {
        width: 100%;
        height: 100px;
      }

      .hero {
        height: 300px;
      }

      .middle {
        grid-template-columns: 1fr;
        grid-template-rows: 220px 120px 220px;
        height: auto;
      }

      .blank {
        display: none;
      }

      .side {
        grid-template-rows: 120px 120px;
      }

      .banner {
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="header">HEADER</div>
      <div class="menu">MENU</div>
    </div>

    <div class="hero">HERO</div>

    <div class="middle">
      <div class="main">MAIN</div>
      <div class="blank"></div>
      <div class="side">
        <div class="image">IMAGE</div>
        <div class="extra">EXTRA</div>
      </div>
    </div>

    <div class="banner">BANNER</div>
  </div>
</body>
</html>
