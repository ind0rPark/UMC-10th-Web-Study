<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aido Navbar 완성형</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Pretendard', sans-serif;
            background-color: #f5f5f5;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            border: 3px solid #000;
            border-radius: 60px;
            padding: 8px 30px;
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            font-size: 26px;
            font-weight: 900;
            gap: 12px;
        }

        .navbar__menu {
            display: flex;
            list-style: none;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .navbar__menu-link {
            text-decoration: none;
            color: #777;
            font-weight: 800;
        }

        .lang-switch {
            display: flex;
            align-items: center;
            gap: 4px; 
            padding-left: 10px;
        }

        .lang-switch__label {
            font-size: 15px;
            color: #bbb;
            font-weight: 700;
            margin-right: 5px;
        }

        .lang-switch__btn {
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            padding: 6px 14px;
            border-radius: 50px;
            border: 3px solid #333; 
            color: #bbb;
            background-color: #fff;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lang-switch__btn--active {
            background-color: #ff6b4a;
            color: #fff;
            border: 3px solid #333;
        }

        @media (max-width: 992px) {
            .navbar__menu {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar__logo">
            <span>Aido</span>
        </div>

        <ul class="navbar__menu">
            <li><a href="#" class="navbar__menu-link">고양이 친구들</a></li>
            <li><a href="#" class="navbar__menu-link">패치 노트</a></li>
            <li><a href="#" class="navbar__menu-link" style="color: #ff6b4a;">앱 다운로드</a></li>
        </ul>

        <div class="lang-switch">
            <span class="lang-switch__label">언어</span>
            <a href="#" class="lang-switch__btn lang-switch__btn--active">KO</a>
            <a href="#" class="lang-switch__btn">EN</a>
        </div>
    </div>

</body>
</html>
