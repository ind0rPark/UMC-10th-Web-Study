<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMC Study Plan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="title">UMC Study Plan</h1>

    <div class="input-section">
      <div class="top-line"></div>

      <input
        type="text"
        class="todo-input"
        id="todoInput"
        placeholder="스터디 계획을 작성해보세요!"
      />
    </div>

    <main class="board">
      <section class="column">
        <h2 class="column-title">해야 할 일</h2>
        <ul class="todo-list" id="todoList"></ul>
      </section>

      <section class="column">
        <h2 class="column-title">해낸 일</h2>
        <ul class="todo-list" id="doneList"></ul>
      </section>
    </main>
  </div>

  <script type="module" src="./dist/script.js"></script>
</body>
</html>
