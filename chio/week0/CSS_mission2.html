<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .grid_container1{
            display: grid;
            height: 800px;
            width: 600px;
            grid-template-rows: 1fr 3fr 3fr 1fr;
          

        }

        .flex_container1{
            display: flex;
            
        }

        .HEADER{
            display: flex;
            justify-content: center;
            align-items: center;
            
            background-color: black;
            color: white;
            flex: 2;
           
           
        }

        .MENU{
            display: flex;
            justify-content: center;
            align-items: center;
            
            flex: 3;
            background-color: red;
            color: white;
        }
        .HERO{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background: blue;
        }

        .grid_container2{
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            
        }

        .MAIN{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: rgb(36, 20, 127);
            grid-row: 1/3;
          
        }

        .IMAGE{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: greenyellow;
            width: 50%;
            justify-self: end;
        }

        .EXTRA {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: green;
            width: 50%;
            justify-self: end;
        }

        .BANNER{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: rgb(245, 204, 55);
            
        }

    </style>


</head>



<body>
    
</body>
    <div class="grid_container1">
        <div class="flex_container1">
            <div class="HEADER">HEADER</div>
            <div class="MENU">MENU</div>
        </div>

        <div class="HERO">HERO</div>
        <div class="grid_container2">
            <div class="MAIN">MAIN</div>
            <div class="IMAGE">IMAGE</div>
            <div class="EXTRA">EXTRA</div>
        </div>
        <div class="BANNER">BANNER</div>

    </div>

</html>
