<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0주차 미션2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;
            font-weight: bold;
        }

        .container {
            display: grid;
            height: 100vh;
            grid-template-columns: 2fr 0.5fr 1fr;
            grid-template-rows: 60px 250px 1fr 1fr 80px;
            
            grid-template-areas:
                "header menu menu"
                "hero hero hero"
                "main empty image"
                "main empty extra"
                "banner banner banner";
        }

        .container > div, 
        .container > section,
        .container > header, 
        .container > nav, 
        .container > main, 
        .container > footer {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .header { grid-area: header; background-color: #1a2533; }
        .menu   { grid-area: menu;   background-color: #f04e58; }
        .hero   { grid-area: hero;   background-color: #5489c7; }
        .main   { grid-area: main;   background-color: #263347; }
        .empty  { grid-area: empty;  background-color: #ffffff; color: black; }
        .image  { grid-area: image;  background-color: #c2e5e8; color: black; }
        .extra  { grid-area: extra;  background-color: #57bd93; color: black; }
        .banner { grid-area: banner; background-color: #ffcf66; color: black; }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                grid-template-areas:
                    "header"
                    "menu"
                    "hero"
                    "main"
                    "image"
                    "extra"
                    "banner";
            }
            .empty { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">HEADER</header>
        <nav class="menu">MENU</nav>
        <section class="hero">HERO</section>
        <main class="main">MAIN</main>
        <div class="empty"></div> <div class="image">IMAGE</div>
        <div class="extra">EXTRA</div>
        <footer class="banner">BANNER</footer>
    </div>


</body>
</html>
