<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <header class="layout__header">
        <div class="layout__logo">HEADER</div>
        <nav class="layout__nav">MENU</nav>
      </header>

      <section class="layout__hero">HERO</section>

      <section class="layout__content">
        <div class="layout__main">MAIN</div>
        <div class="layout__gap"></div>
        <div class="layout__sidebar">
          <div class="layout__image">IMAGE</div>
          <div class="layout__extra">EXTRA</div>
        </div>
      </section>

      <footer class="layout__banner">BANNER</footer>
    </div>
  </body>
</html>
