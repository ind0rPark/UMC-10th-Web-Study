<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mission1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <img src="logo.png" alt="Aido logo">
      <span>Aido</span>
    </div>

    <nav class="nav-menu">
      <a href="#" class="active" id="menu1">고양이 친구들</a>
      <a href="#" id="menu2">출시 알람 받기</a>
    </nav>

    <div class="lang-switch">
      <span class="lang-label" id="langLabel">언어</span>
      <button class="lang-btn active" type="button">KO</button>
      <button class="lang-btn" type="button">EN</button>
    </div>
  </header>

  <main>
  </main>

  <script>
    const menus = document.querySelectorAll(".nav-menu a");

    menus.forEach(menu => {
      menu.addEventListener("click", function(e) {
        e.preventDefault();
        menus.forEach(m => m.classList.remove("active"));
        this.classList.add("active");
      });
    });

    const langs = document.querySelectorAll(".lang-btn");

    langs.forEach(btn => {
      btn.addEventListener("click", function() {
        langs.forEach(b => b.classList.remove("active"));
        this.classList.add("active");
      });
    });

    const menu1 = document.getElementById("menu1");
    const menu2 = document.getElementById("menu2");
    const langLabel = document.getElementById("langLabel");

    langs.forEach(btn => {
      btn.addEventListener("click", function() {
        langs.forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        if (this.textContent === "EN") {
          menu1.textContent = "Cat Friends";
          menu2.textContent = "Cat Launch Alerts";
          langLabel.textContent = "LANGUAGE";
        } else {
          menu1.textContent = "고양이 친구들";
          menu2.textContent = "출시 알람 받기";
          langLabel.textContent = "언어";
        }
      });
    });
  </script>
</body>
</html>
