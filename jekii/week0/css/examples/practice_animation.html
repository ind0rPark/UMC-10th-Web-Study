<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animation</title>
    <style>
      .circle {
        width: 100px;
        height: 100px;
        border-radius: 100%;
        background-color: aliceblue;
        margin: auto;
        margin-top: 100px;
        animation: 0.9s ease-in 0.2s infinite alternate both running jump;
      }
      @keyframes jump {
        0% {
          transform: translateY(0%);
        }
        100% {
          transform: translateY(250%) scaleY(0.7);
        }
      }
    </style>
  </head>
  <body>
    <div class="circle"></div>
  </body>
</html>
