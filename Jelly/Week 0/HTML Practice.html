<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML practice</title>
</head>

<style>
.block{
  background-color: rgb(255, 255, 169);
  width: 160px;
  margin-right: 10px;
  padding: 5px 8px;
}


.inline,
cite,
data {
  background-color: lightcoral;
  margin-right: 10px;
  padding: 5px 8px;
}

.inlineblock {
  display: inline-block;
  background-color: lightgreen;
  width: 160px;
  height: 80px;
  margin-right: 10px;
  padding: 10px;
  box-sizing: border-box;
  vertical-align: top;
}

</style>

<body>

  <h2>block</h2>
  <p class="block">This is p</p>
  <pre class="block">This is pre</pre>
  <blockquote class="block">This is blockquote</blockquote>

  <h2>inline</h2>
  <span class="inline">This is span</span>
  <cite>This is cite</cite>
  <data value="1">This is data</data>

  <h2>inline-block</h2>
  <article class="inlineblock">This is article</article>
  <section class="inlineblock">This is section</section>
  <aside class="inlineblock">This is aside</aside>

</body>
</html>
