<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid 가운데 정렬</title>
    <style>
      .container {
        width: 500px;
        height: 500px;
        outline: dashed lightgrey;
        margin: 100px auto;
        display: grid;
        place-items: center;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: rgb(20, 181, 146);
        color: white;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">BOX</div>
      <div class="box">BOX</div>
      <div class="box">BOX</div>
      <div class="box">BOX</div>
    </div>
  </body>
</html>
