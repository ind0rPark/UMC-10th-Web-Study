<!DOCTYPE html>
<html lang = "ko">
<head>
  <title>UMC Study Plan</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #dce6f5;
      padding: 40px;
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* 입력창 */
    .todo__input {
      display: block;
      width: 60%;
      margin: 0 auto 30px;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 16px;
    }

    /* 할일 목록 컨테이너 */
    .todo__lists {
      display: flex;
      justify-content: center;
      gap: 100px;
    }

    .todo__section h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 16px;
    }

    /* 각 아이템 */
    .todo__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 10px;
    }

    .todo__item span {
      font-size: 15px;
    }

    .todo__btn {
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>UMC Study Plan</h1>

  <input
    class="todo__input"
    type="text"
    placeholder="스터디 계획을 작성해보세요!"
  />

  <div class="todo__lists">
    <section class="todo__section">
      <h2>해야 할 일</h2>
      <div class="todo__pending"></div>
    </section>

    <section class="todo__section">
      <h2>해낸 일</h2>
      <div class="todo__done"></div>
    </section>
  </div>

  <script>
    const input = document.querySelector('.todo__input');
    const pendingList = document.querySelector('.todo__pending');
    const doneList = document.querySelector('.todo__done');

    // Enter 누르면 추가
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTodo(input.value.trim());
        input.value = '';
      }
    });

    function addTodo(text) {
      if (!text) return;

      const item = document.createElement('div');
      item.className = 'todo__item';

      const span = document.createElement('span');
      span.textContent = text;

      const completeBtn = document.createElement('button');
      completeBtn.className = 'todo__btn';
      completeBtn.textContent = '완료';
      completeBtn.addEventListener('click', () => completeTodo(item, text));

      item.appendChild(span);
      item.appendChild(completeBtn);
      pendingList.appendChild(item);
    }

    function completeTodo(item, text) {
      item.remove();

      const doneItem = document.createElement('div');
      doneItem.className = 'todo__item';

      const span = document.createElement('span');
      span.textContent = text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'todo__btn';
      deleteBtn.textContent = '삭제';
      deleteBtn.addEventListener('click', () => deleteTodo(doneItem));

      doneItem.appendChild(span);
      doneItem.appendChild(deleteBtn);
      doneList.appendChild(doneItem);
    }

    function deleteTodo(item) {
      item.remove();
    }
  </script>

</body>
</html>
