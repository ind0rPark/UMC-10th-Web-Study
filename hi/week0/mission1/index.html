<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aido Navbar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f3ef;
      font-family: Arial, Helvetica, sans-serif;
      padding: 8px 16px;
    }

    .navbar-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .navbar {
      width: 100%;
      max-width: 1100px;
      min-height: 78px;
      background: #f7f7f7;
      border: 3px solid #2f2f2f;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 26px;
      position: relative;
      box-shadow: 8px 8px 0 #2f2f2f;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-box {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #ff7043;
      border: 2px solid #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transform: rotate(-8deg);
      flex-shrink: 0;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      color: #2f2f2f;
      line-height: 1;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 28px;
      min-width: 0;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 34px;
      white-space: nowrap;
    }

    .nav-link {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #8a8a8a;
      cursor: pointer;
    }

    .nav-link.is-accent {
      color: #ff6d42;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 12px 8px 16px;
      border: 2px solid #2f2f2f;
      border-radius: 999px;
      background: #f7f7f7;
      flex-shrink: 0;
    }

    .lang-label {
      font-size: 12px;
      color: #8a8a8a;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .lang-buttons {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px;
      border: 2px solid #2f2f2f;
      border-radius: 999px;
      background: #ffffff;
    }

    .lang-btn {
      min-width: 42px;
      height: 28px;
      padding: 0 12px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #777;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: #ff6d42;
      color: #fff;
    }

    @media (max-width: 900px) {
      .navbar {
        padding: 14px 18px;
      }

      .navbar-right {
        gap: 16px;
      }

      .nav-menu {
        gap: 18px;
      }

      .nav-link {
        font-size: 15px;
      }

      .brand {
        font-size: 20px;
      }
    }

    /* 핵심: 화면이 작아지면 메뉴 텍스트 숨기기 */
    @media (max-width: 700px) {
      .nav-menu {
        display: none;
      }

      .navbar {
        padding: 12px 16px;
        border-radius: 28px;
      }

      .brand {
        font-size: 20px;
      }

      .lang-switch {
        gap: 10px;
        padding: 6px 10px 6px 12px;
      }

      .lang-label {
        font-size: 11px;
      }

      .lang-btn {
        min-width: 38px;
        height: 26px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="navbar-wrap">
    <header class="navbar">
      <div class="navbar-left">
        <div class="logo-box">🐱</div>
        <div class="brand">Aido</div>
      </div>

      <div class="navbar-right">
        <nav class="nav-menu">
          <button class="nav-link" id="menu1">고양이 친구들</button>
          <button class="nav-link is-accent" id="menu2">출시 알림 받기</button>
        </nav>

        <div class="lang-switch">
          <span class="lang-label" id="langLabel">언어</span>
          <div class="lang-buttons">
            <button class="lang-btn active" id="btnKo" type="button">KO</button>
            <button class="lang-btn" id="btnEn" type="button">EN</button>
          </div>
        </div>
      </div>
    </header>
  </div>

  <script>
    const menu1 = document.getElementById("menu1");
    const menu2 = document.getElementById("menu2");
    const langLabel = document.getElementById("langLabel");

    const btnKo = document.getElementById("btnKo");
    const btnEn = document.getElementById("btnEn");

    function setLanguage(lang) {
      if (lang === "ko") {
        menu1.textContent = "고양이 친구들";
        menu2.textContent = "출시 알림 받기";
        langLabel.textContent = "언어";

        btnKo.classList.add("active");
        btnEn.classList.remove("active");

        document.documentElement.lang = "ko";
      } else {
        menu1.textContent = "Cat friends";
        menu2.textContent = "Get Launch Alerts";
        langLabel.textContent = "LANGUAGE";

        btnEn.classList.add("active");
        btnKo.classList.remove("active");

        document.documentElement.lang = "en";
      }
    }

    btnKo.addEventListener("click", () => setLanguage("ko"));
    btnEn.addEventListener("click", () => setLanguage("en"));
  </script>
</body>
</html>
