<!DOCTYPE html>
<html lang = "ko">
<head>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    .navbar {
      display: flex;
      height: 100px;
    }

    .navbar__header {
      width: 30%;
      background-color: #1a2340;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    .navbar__menu {
      width: 70%;
      background-color: #e84057;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      background-color: #4a7bc8;
      color: white;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }

    /* CONTENT 영역 */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: 400px;
    }

    .content__main {
      background-color: #1a2340;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .content__blank {
      background-color: white;
    }

    .content__side {
      display: flex;
      flex-direction: column;
    }

    .content__image {
      background-color: #7ecec4;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    .content__extra {
      background-color: #2ecc71;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* BANNER */
    .banner {
      background-color: #f0b429;
      color: white;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__header">HEADER</div>
    <div class="navbar__menu">MENU</div>
  </nav>

  <div class="hero">HERO</div>

  <div class="content">
    <div class="content__main">MAIN</div>
    <div class="content__blank"></div>
    <div class="content__side">
      <div class="content__image">IMAGE</div>
      <div class="content__extra">EXTRA</div>
    </div>
  </div>

  <div class="banner">BANNER</div>

</body>
</html>
