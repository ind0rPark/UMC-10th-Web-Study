<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공</title>
  <style>
    .ball {
      width: 60px;
      height: 60px;
      background: purple;
      border-radius: 50%;
      position: absolute;
      left: 120px;
      bottom: 0;
      animation: bounce 0.8s ease-in-out infinite alternate;
    }

    @keyframes bounce {
      0% {
        bottom: 0;
        transform: scaleX(1.15) scaleY(0.85);
      }
      70% {
        transform: scaleX(1) scaleY(1);
      }
      100% {
        bottom: 200px;
        transform: scaleX(0.95) scaleY(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="ball"></div>
  </div>
</body>
</html>
