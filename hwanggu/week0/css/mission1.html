<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aido Navbar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f0e8;
      font-family: sans-serif;
      padding: 20px;
    }

  
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f5f0e8;
      border: 2px solid #222;
      border-radius: 50px;
      padding: 10px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
  
    .navbar__logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #222;
      font-weight: bold;
      font-size: 18px;
    }

    .navbar__logo-icon {
      width: 36px;
      height: 36px;
      background-color: #e8824a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .navbar__menu {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .navbar__menu-item {
      text-decoration: none;
      color: #222;
      font-size: 15px;
      font-weight: 500;
    }

    .navbar__menu-item:hover {
      color: #e8824a;
    }

  
    .navbar__actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar__btn {
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid #222;
      text-decoration: none;
    }


    .navbar__btn--download {
      background-color: #e8824a;
      color: white;
      border-color: #e8824a;
    }

    .navbar__btn--download:hover {
      background-color: #d4733d;
    }

  
    .navbar__lang {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 2px solid #222;
      border-radius: 50px;
      padding: 4px 8px;
      font-size: 13px;
    }

    .navbar__lang-btn {
      padding: 2px 8px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: transparent;
      font-size: 13px;
    }

    .navbar__lang-btn--active {
      background-color: #e8824a;
      color: white;
    }

    @media (max-width: 768px) {
      .navbar__menu-item--text {
        display: none;
      }

      .navbar__btn--text {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">

    <a href="#" class="navbar__logo">
      <div class="navbar__logo-icon">🐱</div>
      <span>Aido</span>
    </a>

    <div class="navbar__menu">
      <a href="#" class="navbar__menu-item navbar__menu-item--text">
        고양이 친구들
      </a>
    </div>

    <div class="navbar__actions">
      <a href="#" class="navbar__btn navbar__btn--download navbar__btn--text">
        앱 다운로드
      </a>

      <div class="navbar__lang">
        <span style="font-size:12px; color:#888;">언어</span>
        <button
          class="navbar__lang-btn navbar__lang-btn--active"
          onclick="setLang('ko', this)">
          KO
        </button>
        <button
          class="navbar__lang-btn"
          onclick="setLang('en', this)">
          EN
        </button>
      </div>
    </div>

  </nav>

  <script>
    function setLang(lang, btn) {
      document.querySelectorAll('.navbar__lang-btn').forEach(b => {
        b.classList.remove('navbar__lang-btn--active');
      });
      btn.classList.add('navbar__lang-btn--active');
    }

    const i18n = {
  ko: { menu: '고양이 친구들', download: '앱 다운로드', langLabel: '언어' },
  en: { menu: 'Cat Friends',   download: 'Download App', langLabel: 'Lang'  },
};  

    function setLang(lang, btn) {
      document.querySelectorAll('.navbar__lang-btn').forEach(b => {
        b.classList.remove('navbar__lang-btn--active');
      });
      btn.classList.add('navbar__lang-btn--active');

      document.querySelectorAll('.navbar__menu-item--text').forEach(el => {
        el.textContent = i18n[lang].menu;
      });
      document.querySelectorAll('.navbar__btn--text').forEach(el => {
        el.textContent = i18n[lang].download;
      });
      document.querySelectorAll('.navbar__lang span').forEach(el => {
        el.textContent = i18n[lang].langLabel;
      });
    }
  </script>

</body>
</html>
