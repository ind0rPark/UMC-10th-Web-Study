<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mission2</title>

  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
      height: 710px;

      display: grid;
      grid-template-columns: 2fr 3fr 2fr 1.5fr;
      grid-template-rows: 90px 200px 300px 120px;
      grid-template-areas:
        "header menu menu menu"
        "hero hero hero hero"
        "main empty empty side"
        "banner banner banner banner";
    }

    .box {
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      font-weight: 300;
    }

    .header {
      grid-area: header;
      background: black;
    }

    .menu {
      grid-area: menu;
      background: red;
    }

    .hero {
      grid-area: hero;
      background: #4d76c3;
    }

    .main {
      grid-area: main;
      width: 400px;
      background: #223f78;
    }

    .side {
      grid-area: side;
      display: flex;
      width: 150px;
      flex-direction: column;
    }

    .image {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      font-weight: 300;
      background: #18a9df;
    }

    .extra {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      font-weight: 300;
      background: #5b8d35;
    }

    .banner {
      grid-area: banner;
      background: #f2d463;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box header">HEADER</div>
    <div class="box menu">MENU</div>
    <div class="box hero">HERO</div>
    <div class="box main">MAIN</div>
    <div class="empty"></div>

    <div class="side">
      <div class="image">IMAGE</div>
      <div class="extra">EXTRA</div>
    </div>

    <div class="box banner">BANNER</div>
  </div>
</body>
</html>
