<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
        box-sizing: border-box;
        }

        body {
        margin: 0;
        padding: 20px 28px;
        background: #f6f4f1;
        font-family: Arial, sans-serif;
        }

        .navbar-wrap {
        width: 100%;
        
        }

        .navbar {
        width: 100%;
        min-height: 112px;
        padding: 0 48px;
        background: #f7f6f4;
        border: 4px solid #2f2f2f;
        border-radius: 38px;
        box-shadow: 12px 12px 0 #2f2f2f;
        display: flex;
        align-items: center;
        justify-content: space-between;
        }

        .navbar__left {
        display: flex;
        align-items: center;
        gap: 22px;
        }

        .navbar__logo-box {
        width: 58px;
        height: 58px;
        border: 4px solid #2f2f2f;
        border-radius: 18px;
        background: #ff6b42;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(-6deg);
        flex-shrink: 0;
        }

        .navbar__logo {
        font-size: 30px;
        line-height: 1;
        }

        .navbar__brand {
        font-size: 42px;
        font-weight: 800;
        color: #2f2f2f;
        }

        .navbar__center {
        display: flex;
        align-items: center;
        gap: 42px;
        }

        .navbar__menu {
        font-size: 28px;
        font-weight: 700;
        color: #8e8a86;
        cursor: pointer;
        white-space: nowrap;
        }

        .navbar__menu--active {
        color: #ff6b42;
        }

        .navbar__right {
        display: flex;
        align-items: center;
        }

        .lang-box {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px 8px 20px;
        background: #ffffff;
        border: 4px solid #2f2f2f;
        border-radius: 999px;
        }

        .lang-box__label {
        font-size: 18px;
        font-weight: 600;
        color: #9a9691;
        margin-right: 4px;
        }

        .lang-box__option {
        display: none;
        }

        .lang-box__btn {
        min-width: 68px;
        height: 46px;
        padding: 0 18px;
        border: 3px solid #2f2f2f;
        border-radius: 999px;
        background: #ffffff;
        color: #7c7c7c;
        font-size: 24px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        }

        .lang-box__option:checked + .lang-box__btn {
        background: #ff6b42;
        color: white;
        }

        @media (max-width: 1200px) {
      
            .navbar__center {
                display: none;
            }


        }
    </style>

</head>
<body>
    <div class="navbar-wrap">
  <nav class="navbar">
    <div class="navbar__left">
      <div class="navbar__logo-box">
        <span class="navbar__logo">🐱</span>
      </div>
      <div class="navbar__brand">Aido</div>
    </div>

    <div class="navbar__center">
      <div class="navbar__menu">고양이 친구들</div>
      <div class="navbar__menu">패치 노트</div>
      <div class="navbar__menu navbar__menu--active">앱 다운로드</div>
    </div>

    <div class="navbar__right">
      <div class="lang-box">
        <div class="lang-box__label">언어</div>
        <input class="lang-box__option" type="radio" name="language" id="lang-ko" checked>
        <label class="lang-box__btn" for="lang-ko">KO</label>
        <input class="lang-box__option" type="radio" name="language" id="lang-en">
        <label class="lang-box__btn" for="lang-en">EN</label>
      </div>
    </div>
  </nav>
</div>
</body>
</html>
