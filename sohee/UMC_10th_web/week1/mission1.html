<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>YONG TODO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="todo">
    <h1 class="todo__title">YONG TODO</h1>

    <div class="todo__input-box">
      <input id="input" class="todo__input" placeholder="할 일 입력" />
      <button id="addBtn" class="todo__add-btn">할 일 추가</button>
    </div>

    <div class="todo__lists">
      <div class="todo__section">
        <h2 class="todo__subtitle">할 일</h2>
        <div id="todoList"></div>
      </div>

      <div class="todo__section">
        <h2 class="todo__subtitle">완료</h2>
        <div id="doneList"></div>
      </div>
    </div>
  </div>

  <script src="dist/app.js"></script>
</body>
</html>
